name: Release extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to package, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLASMO_PUBLIC_POLISH_URL: ${{ vars.PLASMO_PUBLIC_POLISH_URL }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Validate release configuration
        shell: bash
        run: |
          if [[ -z "$PLASMO_PUBLIC_POLISH_URL" ]]; then
            echo "::error::Add PLASMO_PUBLIC_POLISH_URL under Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v$package_version" ]]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $package_version."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Package extension
        shell: bash
        run: |
          pnpm package
          cp build/chrome-mv3-prod.zip "build/grammar-pal-${RELEASE_TAG}-chrome.zip"
          unzip -t "build/grammar-pal-${RELEASE_TAG}-chrome.zip"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="build/grammar-pal-${RELEASE_TAG}-chrome.zip"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$asset" --clobber
            gh release edit "$RELEASE_TAG" --title "Grammar Pal $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" "$asset" \
              --verify-tag \
              --generate-notes \
              --title "Grammar Pal $RELEASE_TAG" \
              --notes "Download the attached Grammar Pal Chrome ZIP under Assets. Do not download GitHub's automatically generated Source code archives. Installation steps are in the README."
          fi
